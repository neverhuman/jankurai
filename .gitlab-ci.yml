# GitLab CI — mirrors .github/workflows/jankurai.yml quality and test gates.
# Release (cross-platform builds, signing) stays GitHub-only.

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: never

stages:
  - quality
  - test

variables:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  GIT_DEPTH: "1"

default:
  image: rust:1.95.0
  tags: [default]
  interruptible: true
  timeout: 90m
  before_script:
    - unset RUSTC_WRAPPER
    - pkill sccache 2>/dev/null || true
    - rustup component add rustfmt clippy
    - |
      if ! command -v cargo-nextest >/dev/null 2>&1; then
        curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C /usr/local/bin
      fi

fmt:
  stage: quality
  script:
    - cargo fmt --all -- --check

clippy:
  stage: quality
  script:
    - cargo clippy --workspace --all-targets -- -D warnings

check:
  stage: quality
  script:
    - cargo check --workspace --all-targets

test:
  stage: test
  script:
    - cargo nextest run --workspace --no-fail-fast
