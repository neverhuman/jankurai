# Pinned Rust toolchain. The CI workflow runs `rustup show` which
# automatically installs whatever this file requests; local runs via
# `just ci-*` use the same components. Keep this in sync with
# ops/ci/lib.sh for any non-rustup tools.
[toolchain]
channel = "1.95.0"
components = ["rustfmt", "clippy", "llvm-tools-preview"]
profile = "minimal"
