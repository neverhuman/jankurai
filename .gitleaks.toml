title = "jankurai secret-scan policy"

[extend]
useDefault = true

[[allowlists]]
description = "known non-secret fixture and documentation phrases"
regexTarget = "line"
paths = [
  '''^examples/perfect-web-api-db/backend/src/auth_session\.rs$''',
  '''^examples/perfect-web-api-db/docs/auth-session-cell\.md$''',
  '''^examples/perfect-web-api-db/ops/auth-session-security\.md$''',
  '''^examples/perfect-web-api-db/ops/security\.md$''',
  '''^docs/BAD_PYTHON\.md$''',
  '''^docs/BAD_GIT\.md$''',
  '''^reference/repo-standard/blueprint/examples/agent-map\.example\.json$''',
  '''^paper/research/BAD_PYTHON\.txt$''',
  '''^paper/research/BAD_GIT\.txt$''',
  '''^tips/phases_feedback/12-phase/tip1\.txt$''',
]
regexes = [
  '''token-hash''',
  '''signing[- ]key''',
]
