# Self-hosted GitHub Actions CI (FREE; runs on our "jankurai-ci" runner). Mirrors the local jeryu
# host-ci entrypoint cascade. GitHub-hosted (paid) runners are NOT used.
name: ci
on:
  push:
  pull_request:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  ci:
    runs-on: [self-hosted, Linux, X64, jankurai-ci]
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Local CI (host-ci cascade)
        run: |
          set -euo pipefail
          if [[ -f ops/ci/pr-ci.sh ]]; then bash ops/ci/pr-ci.sh
          elif [[ -x ./ci-fast-push.sh ]]; then WORKERS=20 ./ci-fast-push.sh --no-push --ci
          elif [[ -f scripts/ci-local.sh ]]; then bash scripts/ci-local.sh
          elif command -v just >/dev/null 2>&1 && { [[ -f justfile ]] || [[ -f Justfile ]]; }; then just check
          elif [[ -f Cargo.toml ]]; then cargo nextest run --workspace --no-fail-fast || cargo test --workspace --no-fail-fast
          else echo "no recognized CI entrypoint"; exit 1; fi
