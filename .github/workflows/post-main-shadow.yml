name: post-main-shadow

# Ported from .gitlab-ci.yml job `post_main_shadow` (deploy stage).
# Main-only, non-blocking shadow lane: after main advances it mirrors the
# accepted commit through Jeryu's local shadow config and writes a receipt.
# GitLab `allow_failure: true` -> GitHub `continue-on-error: true`.
#
# Marketplace-free checkout idiom (git init + fetch + checkout --detach; no
# actions/checkout) so the lane has no marketplace dependency. The executable
# source of truth is ops/ci/post-main-shadow.sh — local runs use the same
# script. See docs/ci-local.md for the local-CI contract.

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: post-main-shadow-${{ github.ref }}
  cancel-in-progress: false

jobs:
  post-main-shadow:
    name: post main shadow
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Non-blocking: mirrors GitLab `allow_failure: true`.
    continue-on-error: true
    steps:
      - name: Checkout (marketplace-free)
        run: |
          git init -q .
          git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          git -c protocol.version=2 fetch --no-tags --prune --depth=1 origin "+${GITHUB_SHA}:refs/remotes/origin/shadow-head"
          git checkout --detach --quiet "${GITHUB_SHA}"

      - name: Install Rust toolchain
        run: rustup show

      - name: Post-main shadow lane
        run: bash ops/ci/post-main-shadow.sh

      - name: Upload shadow receipt
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: jeryu-shadow
          if-no-files-found: ignore
          path: |
            target/jankurai/jeryu-shadow.json
            target/jankurai/jeryu-shadow.md
