name: jankurai

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: jankurai-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Workflows are thin orchestration. The executable source of truth is
# under ops/ci/*.sh — local runs use the same scripts. See
# docs/ci-local.md for the local-CI contract.

jobs:
  test-matrix:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6
        with:
          shared-key: test-${{ matrix.os }}

      - name: Quality gates
        run: bash ops/ci/quality-gates.sh

  coverage-llvm:
    name: coverage (llvm-cov)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6
        with:
          shared-key: coverage

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@c070f87102a1c75b3183910f391c1cb887fe13c8
        with:
          tool: cargo-llvm-cov

      - name: Install cargo-mutants
        run: |
          source ops/ci/lib.sh
          cargo install cargo-mutants --locked --version "$CARGO_MUTANTS_VERSION"

      - name: Coverage lane
        run: bash ops/ci/coverage-llvm.sh

      - name: Publish coverage summary
        if: always()
        run: |
          if [ -f target/coverage/summary.txt ]; then
            {
              echo "### Rust llvm-cov summary"
              echo '```'
              cat target/coverage/summary.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: rust-coverage
          if-no-files-found: ignore
          path: |
            target/coverage/lcov.info
            target/coverage/coverage.json
            target/coverage/summary.txt
            target/llvm-cov/lcov.info
            target/jankurai/coverage/rust-lcov.info
            target/jankurai/coverage/mutation.diff
            target/jankurai/coverage/mutants-list.json
            target/mutants/mutants.out/outcomes.json
            target/mutants/mutants.out/log
            target/mutants/mutants.out/diff

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          cache: npm

      - name: Audit lane
        run: bash ops/ci/audit.sh

      - name: Publish jankurai summary
        if: always()
        run: |
          if [ -f target/jankurai/summary.md ]; then
            cat target/jankurai/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@53e96ec3b35fce51c141c0d6f0e31028a448722d
        with:
          sarif_file: target/jankurai/jankurai.sarif

      - name: Upload jankurai evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: jankurai-score
          if-no-files-found: ignore
          path: |
            target/jankurai/accepted-baseline.json
            target/jankurai/repo-score.json
            target/jankurai/repo-score.md
            target/jankurai/jankurai.sarif
            target/jankurai/summary.md
            target/jankurai/repair-queue.jsonl
            target/jankurai/proofbind/obligations.json
            target/jankurai/proofbind/surface-witness.json
            target/jankurai/proofmark/proofmark-receipt.json
            target/jankurai/proofmark/proof-receipt.json
            target/jankurai/rust/witness-graph.json
            target/jankurai/ux-qa.json
            target/jankurai/ux-qa-server.log
            target/jankurai/coverage/coverage-audit.json
            target/jankurai/coverage/coverage-audit.md
            target/jankurai/security/evidence.json
            target/jankurai/migration-prompt-verification.json
            target/jankurai/migration-prompt-verification.md
            target/jankurai/migration-slice-risk.json
            target/jankurai/migration-slice-risk.md
