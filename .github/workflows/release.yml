name: release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Thin orchestration only. The executable source of truth lives in
# ops/ci/release-*.sh — the same scripts run via `just ci-release`.

jobs:
  audit-gate:
    name: audit gate
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@c070f87102a1c75b3183910f391c1cb887fe13c8
        with:
          tool: cargo-llvm-cov

      - name: Install cargo-mutants
        run: |
          source ops/ci/lib.sh
          cargo install cargo-mutants --locked --version "$CARGO_MUTANTS_VERSION"

      - name: Audit gate
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: bash ops/ci/release-audit-gate.sh

      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@53e96ec3b35fce51c141c0d6f0e31028a448722d
        with:
          sarif_file: target/jankurai/jankurai.sarif

      - name: Upload audit evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-audit
          path: |
            target/jankurai/repo-score.json
            target/jankurai/repo-score.md
            target/jankurai/jankurai.sarif
            target/jankurai/security/evidence.json
            target/jankurai/coverage/rust-lcov.info
            target/jankurai/coverage/mutation.diff
            target/jankurai/coverage/mutants-list.json
            target/mutants/mutants.out/outcomes.json

  build:
    name: build (${{ matrix.target }})
    needs: audit-gate
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          # x86_64-apple-darwin dropped: macos-13 free-runner queue is saturated.
          # Apple Silicon users get aarch64-apple-darwin; Intel-mac users build
          # from source via `cargo install --path crates/jankurai --locked`.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      - name: Build release artifact
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: bash ops/ci/release-build.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: jankurai-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download all build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: dist
          merge-multiple: true

      - name: Download audit evidence
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: release-audit
          path: dist/audit

      - name: Publish release
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
        run: bash ops/ci/release-publish.sh
