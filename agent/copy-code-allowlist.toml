# Copy-code allowlist. Stable fingerprints suppressed from score impact.
#
# Each entry MUST include a fingerprint, owner, and reason.
# Optional `expires` (YYYY-MM-DD): after this date the entry is ignored and
# the finding rehydrates to its scanner severity. Expired entries are treated
# as if they do not exist — findings become hard again.
#
# Suppression demotes a class to Warning severity (no score impact). Suppressed
# classes still appear in the report under `suppressed.by = "allowlist"` for
# full visibility.
#
# Run `jankurai copy-code rank` to get fingerprints for new entries.
#
# Example:
# [[entries]]
# fingerprint = "a1b2c3d4e5f60718"
# owner       = "@alice"
# reason      = "Two adapters legitimately share boilerplate; refactor tracked in JANK-123"
# expires     = "2026-08-01"

entries = []
