minimum_score = 85
fail_on = ["critical", "high"]
advisory_on = ["medium", "low"]
standard_version = "0.9.0"
auditor_version = "1.3.0"
schema_version = "1.9.0"
paper_edition = "2026.05-ed8"
target_stack = "rust-ts-vite-react-postgres-bounded-python"

[history]
max_rows = 500
max_bytes = 1048576
dedupe = "consecutive-equivalent"
mirror_env = "JANKURAI_HISTORY_MIRROR"
mirror_required = false
mirror_max_rows = 5000

[caps]
no_root_agent_instructions = 75
no_one_command_setup_or_validation = 70
no_deterministic_fast_lane = 65
no_security_lane_on_high_risk_repo = 60
generated_contracts_or_public_api_drift_untested = 80
python_direct_product_truth_or_db_ownership = 72
no_secret_or_dependency_scanning_in_ci = 78
no_jankurai_audit_lane_in_ci = 82
non_optimal_product_language_found = 74
too_much_python_in_product_surface = 72
vibe_placeholders_in_product_code = 68
fallback_soup_in_product_code = 70
future_hostile_dead_language_in_product_code = 64
severe_duplication_in_product_code = 70
generated_zone_mutation_risk = 76
direct_db_access_from_wrong_layer = 66
missing_web_e2e_lane = 82
missing_rendered_ux_qa_lane = 84
prompt_injection_risk = 78
overbroad_agent_agency = 65
secret_like_content_detected = 60
false_green_test_risk = 76
destructive_migration_risk = 70
missing_rust_property_or_integration_tests = 82
no_agent_friendly_exception_pattern = 76
missing_agent_readable_docs = 80
streaming_runtime_drift = 78

[limits]
rust_file_hard = 350
typescript_component_hard = 280
python_ai_file_hard = 300
function_hard = 70
agent_instruction_hard = 180
design_doc_hard = 600

[scan]
excluded_paths = ["tips/"]
extra_excluded_paths = ["conformance/fixtures"]
