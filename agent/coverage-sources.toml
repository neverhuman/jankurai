version = 1

[[source]]
id = "rust-lcov"
kind = "line_coverage"
format = "lcov"
mode = "auto"
owner = "tools"
lane = "coverage-audit"
artifacts = ["target/llvm-cov/lcov.info", "target/jankurai/coverage/rust-lcov.info"]
applies_to = ["crates/**/*.rs"]
rules = ["HLT-008-FALSE-GREEN-RISK"]
hard_changed_line_coverage = 0.90
soft_total_line_coverage = 0.75

[[source]]
id = "rust-mutation"
kind = "mutation"
format = "cargo-mutants-json"
mode = "auto"
owner = "tools"
lane = "coverage-audit"
artifacts = ["target/mutants/mutants.out/outcomes.json", "target/mutants/outcomes.json"]
applies_to = ["crates/**/*.rs"]
rules = ["HLT-008-FALSE-GREEN-RISK"]
hard_survivors_on_changed_paths = 1

[[source]]
id = "docker-trivy"
kind = "supply_chain"
format = "trivy-json"
mode = "auto"
owner = "ops"
lane = "security"
artifacts = ["target/jankurai/security/trivy.json"]
applies_to = ["Dockerfile", "docker/**/*.Dockerfile", "docker-compose*.yml", "docker-compose*.yaml"]
rules = ["HLT-016-SUPPLY-CHAIN-DRIFT", "HLT-032-DOCKER-BAD-BEHAVIOR"]
hard_critical_vulnerabilities = 1
