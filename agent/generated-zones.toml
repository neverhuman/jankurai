[[zone]]
path = "paper/figures/stack-ranking.eps"
source = "paper/figures/stack-ranking.md"
command = "generated by figure stream; regenerate from documented score table"
read_only = true
write_policy = "generator_only"

[[zone]]
path = "paper/figures/stack-ranking.pdf"
source = "paper/figures/stack-ranking.eps"
command = "epstopdf paper/figures/stack-ranking.eps --outfile=paper/figures/stack-ranking.pdf"
read_only = true
write_policy = "generator_only"

[[zone]]
path = "paper/jankurai.pdf"
source = "paper/jankurai.tex"
command = "just paper"
read_only = true
write_policy = "generator_only"

[[zone]]
path = "paper/tex/generated/vibe_coverage_table.tex"
source = "agent/vibe-coverage.toml"
command = "cargo run -p jankurai -- vibe coverage --source agent/vibe-coverage.toml --tips tips/vibe_coding --tex paper/tex/generated/vibe_coverage_table.tex"
read_only = false
write_policy = "generator_only"

[[zone]]
path = "paper/tex/generated/public_repo_score_tables.tex"
source = "paper/data/public-repo-scores-20260506T014156Z.json"
command = "cargo run -p jankurai -- paper public-repo-scores --source paper/data/public-repo-scores-20260506T014156Z.json --out paper/tex/generated/public_repo_score_tables.tex"
read_only = false
write_policy = "generator_only"

[[zone]]
path = "paper/tex/generated/conformance_results_table.tex"
source = "conformance/fixtures and conformance/expected"
command = "cargo run -p jankurai -- conformance run --fixtures conformance/fixtures --expected conformance/expected --out target/jankurai/conformance-results.json --md target/jankurai/conformance-results.md --tex paper/tex/generated/conformance_results_table.tex"
read_only = false
write_policy = "generator_only"

[[zone]]
path = ".jankurai/repo-score.json"
source = "crates/jankurai"
command = "cargo run -p jankurai -- . --json .jankurai/repo-score.json --md .jankurai/repo-score.md"
read_only = false
write_policy = "auditor_output"

[[zone]]
path = ".jankurai/repo-score.md"
source = "crates/jankurai"
command = "cargo run -p jankurai -- . --json .jankurai/repo-score.json --md .jankurai/repo-score.md"
read_only = false
write_policy = "auditor_output"

[[zone]]
path = "agent/baselines/main.repo-score.json"
source = "target/jankurai/repo-score.json from a clean accepted main audit"
command = "test -z \"$(git status --short)\" && cargo run -p jankurai -- audit . --mode standard --json target/jankurai/repo-score.json --md target/jankurai/repo-score.md && cp target/jankurai/repo-score.json agent/baselines/main.repo-score.json"
read_only = true
write_policy = "auditor_output"

[[zone]]
path = "package-lock.json"
source = "package.json and packages/*/package.json"
command = "npm install"
read_only = true
write_policy = "lockfile"
