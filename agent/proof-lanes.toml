# Live minimal lane set. The broader target lane vocabulary is documented in docs/moonshot.md and docs/release-plan.md.

[[lane]]
name = "fast"
command = "just fast"
purpose = "run the jankurai audit quickly with JSON and Markdown on stdout"
command_id = "lane.fast"
kind = "validation"
cost = 5
rules_covered = ["HLT-001-DEAD-MARKER", "HLT-003-OWNERLESS-PATH", "HLT-004-UNMAPPED-PROOF"]
required_artifacts = ["agent/repo-score.json", "agent/repo-score.md"]
timeout_seconds = 900
requires_network = false
destructive = false

[[lane]]
name = "audit"
command = "just score"
purpose = "write agent/repo-score.json and agent/repo-score.md"
command_id = "lane.audit"
kind = "audit"
cost = 10
rules_covered = ["HLT-001-DEAD-MARKER", "HLT-003-OWNERLESS-PATH", "HLT-004-UNMAPPED-PROOF", "HLT-008-FALSE-GREEN-RISK"]
required_artifacts = ["agent/repo-score.json", "agent/repo-score.md"]
timeout_seconds = 900
requires_network = false
destructive = false

[[lane]]
name = "coverage-audit"
command = "cargo run -p jankurai -- coverage audit . --config agent/coverage-sources.toml --json target/jankurai/coverage/coverage-audit.json --md target/jankurai/coverage/coverage-audit.md"
purpose = "parse deterministic coverage and proof-gap artifacts without running external tools"
command_id = "lane.coverage-audit"
kind = "analysis"
cost = 8
rules_covered = ["HLT-004-UNMAPPED-PROOF", "HLT-008-FALSE-GREEN-RISK", "HLT-013-RENDERED-UX-GAP", "HLT-014-A11Y-GAP", "HLT-016-SUPPLY-CHAIN-DRIFT", "HLT-021-DESTRUCTIVE-MIGRATION", "HLT-022-AUTHZ-ISOLATION-GAP", "HLT-023-INPUT-BOUNDARY-GAP", "HLT-032-DOCKER-BAD-BEHAVIOR"]
required_artifacts = ["target/jankurai/coverage/coverage-audit.json", "target/jankurai/coverage/coverage-audit.md"]
timeout_seconds = 900
requires_network = false
destructive = false

[[lane]]
name = "paper"
command = "just paper"
purpose = "build paper/jankurai.pdf from paper/jankurai.tex and paper/tex/"

[[lane]]
name = "security"
command = "just security"
purpose = "document and later run secret, dependency, SBOM, and workflow checks"
command_id = "lane.security"
kind = "security"
cost = 20
rules_covered = ["HLT-009-GENERATED-SECURITY", "HLT-010-SECRET-SPRAWL", "HLT-011-PROMPT-INJECTION", "HLT-012-OVERBROAD-AGENCY", "HLT-016-SUPPLY-CHAIN-DRIFT", "HLT-020-CI-HARDENING-GAP"]
required_artifacts = ["target/jankurai/security/evidence.json"]
timeout_seconds = 1800
requires_network = false
destructive = false

[[lane]]
name = "full"
command = "just check"
purpose = "run quality, strict security, conformance, final score, and paper build"
command_id = "lane.full"
kind = "release"
cost = 50
supersedes = ["fast", "audit", "security", "language-bad-behavior", "proofbind", "proofmark-rust"]
required_artifacts = ["agent/repo-score.json", "agent/repo-score.md", "target/jankurai/security/evidence.json", "target/jankurai/conformance-results.json", "paper/jankurai.pdf"]
timeout_seconds = 3600
requires_network = false
destructive = false

[[lane]]
name = "adapters"
command = "cargo run -p jankurai -- adapters verify"
purpose = "verify thin adapter pointers"

[[lane]]
name = "master-plan-proof"
command = "cargo run -p jankurai -- lane . --changed agent/MASTER_PLAN.md --out target/jankurai/master-plan-proof.json --md target/jankurai/master-plan-proof.md"
purpose = "verify master plan routing"

[[lane]]
name = "phase-proof"
command = "cargo run -p jankurai -- lane . --changed tips/phases/logs/README.txt --out target/jankurai/phase-proof.json --md target/jankurai/phase-proof.md"
purpose = "verify phase logs routing"

[[lane]]
name = "versions-check"
command = "cargo test -p jankurai && cargo run -p jankurai -- versions"
purpose = "verify versions"

[[lane]]
name = "doctor"
command = "cargo run -p jankurai -- doctor --fail-on high"
purpose = "run doctor checks"

[[lane]]
name = "test-cli"
command = "cargo test -p jankurai"
purpose = "run Rust unit tests"

[[lane]]
name = "proofbind"
command = "cargo test -p jankurai-proofbind"
purpose = "verify semantic surface routing and obligation binding"
command_id = "lane.proofbind"
kind = "analysis"
cost = 8
rules_covered = ["HLT-004-UNMAPPED-PROOF", "HLT-008-FALSE-GREEN-RISK", "HLT-022-AUTHZ-ISOLATION-GAP", "HLT-023-INPUT-BOUNDARY-GAP", "HLT-024-AGENT-TOOL-SUPPLY-GAP"]
required_artifacts = ["target/jankurai/proofbind/surface-witness.json", "target/jankurai/proofbind/obligations.json", "target/jankurai/proofbind/proofbind.md"]
timeout_seconds = 900
requires_network = false
destructive = false

[[lane]]
name = "proofmark-rust"
command = "cargo test -p jankurai-proofmark"
purpose = "verify changed Rust behavior proof receipts"
command_id = "lane.proofmark-rust"
kind = "validation"
cost = 15
rules_covered = ["HLT-007-HANDWRITTEN-CONTRACT", "HLT-008-FALSE-GREEN-RISK", "HLT-022-AUTHZ-ISOLATION-GAP", "HLT-023-INPUT-BOUNDARY-GAP", "HLT-024-AGENT-TOOL-SUPPLY-GAP", "HLT-029-RUST-BAD-BEHAVIOR"]
required_artifacts = ["target/jankurai/proofmark/proofmark-receipt.json", "target/jankurai/proofmark/proof-receipt.json", "target/jankurai/proofmark/proofmark.md"]
timeout_seconds = 1800
requires_network = false
destructive = false

[[lane]]
name = "language-bad-behavior"
command = "cargo test -p jankurai --test language_bad_behavior"
purpose = "exercise the language bad-behavior fixture pack and catalog docs"
command_id = "lane.language-bad-behavior"
kind = "validation"
cost = 10
rules_covered = ["HLT-029-RUST-BAD-BEHAVIOR", "HLT-030-SQL-BAD-BEHAVIOR", "HLT-031-TYPESCRIPT-BAD-BEHAVIOR", "HLT-032-DOCKER-BAD-BEHAVIOR", "HLT-033-PYTHON-BAD-BEHAVIOR", "HLT-034-CI-BAD-BEHAVIOR", "HLT-035-GIT-BAD-BEHAVIOR", "HLT-036-GITTOOLS-BAD-BEHAVIOR", "HLT-037-RELEASE-BAD-BEHAVIOR"]
required_artifacts = []
timeout_seconds = 900
requires_network = false
destructive = false

[[lane]]
name = "migrate-fixture"
command = "cargo run -p jankurai -- migrate examples/legacy-node-api --json target/jankurai/migration/node.json"
purpose = "verify migration fixture"

[[lane]]
name = "db-migration-analyze"
command = "cargo run -p jankurai -- migrate . --analyze --json target/jankurai/migration-report.json"
purpose = "write migration liability report for DB and modernization evidence"
command_id = "lane.db-migration-analyze"
kind = "analysis"
cost = 15
rules_covered = ["HLT-006-DIRECT-DB-WRONG-LAYER", "HLT-021-DESTRUCTIVE-MIGRATION"]
required_artifacts = ["target/jankurai/migration-report.json"]
timeout_seconds = 1800
requires_network = false
destructive = false

[[lane]]
name = "build-schemas"
command = "cargo test -p jankurai && npm --workspace @jankurai/ux-qa run build"
purpose = "build schema-carrying Rust and UX QA"

[[lane]]
name = "test-ux-ci"
command = "npm ci && npm --workspace @jankurai/ux-qa run build && npm --workspace @jankurai/ux-qa run test"
purpose = "verify npm workspace and tests"

[[lane]]
name = "versions"
command = "just versions"
purpose = "verify versions"

[[lane]]
name = "ux-qa"
command = "just ux-qa"
purpose = "verify UX QA"

[[lane]]
name = "observability"
command = "cargo run -p jankurai -- . --json target/jankurai/observability-score.json --md target/jankurai/observability-score.md"
purpose = "verify telemetry and repair receipt surfaces"
