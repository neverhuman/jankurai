standard = "jankurai"
standard_version = "0.9.0"
paper_edition = "2026.05-ed8"
auditor_version = "1.3.0"
schema_version = "1.9.0"
target_stack = "rust-ts-vite-react-postgres-bounded-python"
published = "2026-05-12"
release_tag = "v1.3.0"

[[artifact]]
id = "paper-source"
path = "paper/jankurai.tex"
kind = "tex-wrapper"
version_field = "paper_edition"
version = "2026.05-ed8"
source = "paper/tex/"
command = "just paper"
generated = false

[[artifact]]
id = "paper-render"
path = "paper/jankurai.pdf"
kind = "pdf"
version_field = "paper_edition"
version = "2026.05-ed8"
source = "paper/jankurai.tex"
command = "just paper"
generated = true

[[artifact]]
id = "paper-agent-md"
path = "paper/jankurai.md"
kind = "agent-markdown"
version_field = "paper_edition"
version = "2026.05-ed8"
source = "paper/jankurai.tex"
command = "manual companion update"
generated = false

[[artifact]]
id = "coding-standard"
path = "docs/agent-native-standard.md"
kind = "standard"
version_field = "standard_version"
version = "0.9.0"
source = "agent/standard-version.toml"
command = "manual standard update"
generated = false

[[artifact]]
id = "agent-standard-brief"
path = "agent/JANKURAI_STANDARD.md"
kind = "agent-brief"
version_field = "standard_version"
version = "0.9.0"
source = "docs/agent-native-standard.md"
command = "manual brief update"
generated = false

[[artifact]]
id = "ux-qa-runtime"
path = "packages/ux-qa"
kind = "typescript-package"
version_field = "auditor_version"
version = "1.2.0"
source = "tips/UX_QA/"
command = "npm --workspace @jankurai/ux-qa run build && npm --workspace @jankurai/ux-qa run test"
generated = false
