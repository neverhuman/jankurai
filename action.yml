name: "Jankurai"
description: "Anti-vibe coding standard and local audit CLI for auditable AI-assisted merge"
branding:
  icon: "check-circle"
  color: "green"

inputs:
  mode:
    description: "Audit mode: advisory, ratchet, or release"
    required: false
    default: "advisory"
  baseline:
    description: "Path to accepted baseline score JSON (required for ratchet or release mode)"
    required: false
    default: "agent/baselines/main.repo-score.json"

runs:
  using: "composite"
  steps:
    - name: Install Rust toolchain
      shell: bash
      run: rustup toolchain install stable --profile minimal --component rustfmt,clippy

    - name: Install local jankurai
      shell: bash
      run: cargo install --path "$GITHUB_ACTION_PATH/crates/jankurai" --locked --force

    - name: Prepare jankurai artifact directories
      shell: bash
      run: mkdir -p target/jankurai target/jankurai/security

    - name: Run jankurai audit
      shell: bash
      run: |
        if [ "${{ inputs.mode }}" = "ratchet" ] || [ "${{ inputs.mode }}" = "release" ]; then
          jankurai audit . --mode "${{ inputs.mode }}" --baseline "${{ inputs.baseline }}" --json target/jankurai/repo-score.json --md target/jankurai/repo-score.md --sarif target/jankurai/jankurai.sarif --github-step-summary target/jankurai/summary.md --repair-queue-jsonl target/jankurai/repair-queue.jsonl
        else
          jankurai audit . --mode "${{ inputs.mode }}" --json target/jankurai/repo-score.json --md target/jankurai/repo-score.md --sarif target/jankurai/jankurai.sarif --github-step-summary target/jankurai/summary.md --repair-queue-jsonl target/jankurai/repair-queue.jsonl
        fi

    - name: Publish jankurai summary
      shell: bash
      if: always()
      run: |
        if [ -f target/jankurai/summary.md ]; then
          cat target/jankurai/summary.md >> "$GITHUB_STEP_SUMMARY"
        fi
