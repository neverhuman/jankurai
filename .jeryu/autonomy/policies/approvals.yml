# Approval policy for jankurai — full-auto for R0–R4, human for R5.
#
# Auto-approval is granted for risk tiers R0–R4. R5 always requires a human
# approver. No-self-approval is part of the safety floor and stays enforced
# regardless of autonomy level: an agent may never approve its own change.
schema_version: "1"

auto_approve:
  enabled: true
  tiers: [R0, R1, R2, R3, R4]
  human_required: false

human_approval:
  tiers: [R5]
  human_required: true

# Safety floor — never relaxed by the autonomy grant.
no_self_approval: true
min_approvals_r5: 1
