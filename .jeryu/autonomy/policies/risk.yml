# Autonomy risk tiers for jankurai — 100% full-auto.
#
# Onboarding to the jeryu GitHub-compatible forge. Risk tiers R0–R4 are
# fully autonomous (auto_merge: true / human_required: false). R5 stays
# fail-closed (human_required: true) so the highest-risk class always
# routes to a human. The safety floor (hard_stops, freeze, protect_main,
# no-self-approval) is enforced independently in the sibling policy files
# and is NOT overridden by this autonomy grant.
schema_version: "1"
mode: full-auto

defaults:
  auto_merge: true
  human_required: false

tiers:
  R0:
    description: "Docs, comments, formatting, generated artifacts."
    auto_merge: true
    human_required: false
  R1:
    description: "Low-risk code: tests, CI lanes, non-load-bearing helpers."
    auto_merge: true
    human_required: false
  R2:
    description: "Standard feature/bugfix changes to library/runner code."
    auto_merge: true
    human_required: false
  R3:
    description: "Cross-cutting changes touching multiple modules or APIs."
    auto_merge: true
    human_required: false
  R4:
    description: "Elevated-risk changes (release packaging, oracle paths, schemas)."
    auto_merge: true
    human_required: false
  R5:
    description: "Highest-risk class: secrets, protected-path edits, force ops, irreversible actions. Fail-closed."
    auto_merge: false
    human_required: true
    fail_closed: true
