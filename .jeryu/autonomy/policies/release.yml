# Release autonomy policy for jankurai.
#
# Release packaging (tag v* -> GitHub Actions `release` workflow) is allowed
# to proceed automatically up to risk tier R4. The release tag namespace
# (v*) remains protected (see protected-paths.yml and .jeryu/policy.toml
# protected_tags) so tag creation/mutation is still governed by the safety
# floor. R5 release actions remain human_required.
schema_version: "1"

auto_release:
  enabled: true
  max_tier: R4
  human_required: false

protected_tags:
  - "v*"

# R5 release actions (e.g. force-publish, retag) stay fail-closed.
r5:
  human_required: true
  fail_closed: true
