# Protected paths for jankurai — part of the safety floor.
#
# Edits to these paths are classified R5 (human_required: true) regardless of
# the otherwise full-auto autonomy grant. This keeps governance, autonomy
# policy, CI transport config, generated zones, the protected-branch /
# protected-tag surfaces, and the audit-tool PRODUCT vocabulary data
# fail-closed.
schema_version: "1"

protected_paths:
  # Governance + autonomy + CI transport config.
  - ".jeryu/policy.toml"
  - ".jeryu/ci.toml"
  - ".jeryu/local/repos/**"
  - ".jeryu/autonomy/**"
  - ".github/workflows/**"
  - ".gitlab-ci.yml"
  - ".gitlab/**"
  # Generated zones / audit policy.
  - "agent/generated-zones.toml"
  - "agent/audit-policy.toml"
  # PRODUCT source: the audit tool's GitLab/provider vocabulary is product
  # data, NOT CI. These must never be retargeted or rewritten by autonomy.
  - "crates/jankurai/src/audit/language_rules/**"
  - "crates/jankurai/src/commands/migrate/inventory.rs"
  - "crates/jankurai/src/init/templates.rs"
  - "tips/**"
  - "docs/BAD_*.md"
  - "paper/**"

protect_main: true
protected_branches:
  - "main"
protected_tags:
  - "v*"

# Editing a protected path escalates to R5 and is fail-closed.
on_protected_path_change:
  tier: R5
  human_required: true
  fail_closed: true
