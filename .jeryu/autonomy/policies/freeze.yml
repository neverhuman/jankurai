# Freeze + hard-stop safety floor for jankurai.
#
# The autonomy grant (R0–R4 full-auto) is unconditionally suspended whenever
# a freeze is active or any hard_stop condition is met. These controls are
# the safety floor and are never relaxed by the full-auto autonomy level.
schema_version: "1"

freeze:
  active: false
  # When active, ALL auto_merge/auto_release is suspended and every change
  # routes to a human regardless of risk tier.
  on_active:
    auto_merge: false
    human_required: true

hard_stops:
  - secret_or_credential_exposure
  - force_push_to_protected_branch
  - protected_tag_mutation
  - protected_path_edit
  - history_rewrite_on_main
  - disabling_safety_floor
  - self_approval_attempt

on_hard_stop:
  auto_merge: false
  human_required: true
  fail_closed: true
