- class_id: monolith-crate
  rule: "One ARC should own one coherent responsibility."
  allowed_exception: "Tightly coupled low-level kernels or protocol engines with shared invariants and one owner."
  reason_required: "Explain why splitting would increase unsafe, protocol, or coordination risk."
  fix_tip: "Extract adapters or the outer public surface before splitting the kernel."
  doc_links:
    - https://doc.rust-lang.org/cargo/reference/workspaces.html
  sunset_condition: "Revisit when ownership splits or dependency fan-out widens."

- class_id: junk-drawer-shared-crate
  rule: "No generic common, utils, shared, or helpers crate by default."
  allowed_exception: "Truly cross-cutting primitives with low churn and narrow exports."
  reason_required: "Explain why each export cannot live nearer its domain."
  fix_tip: "Split the crate by domain, protocol, or adapter boundary."
  doc_links:
    - https://doc.rust-lang.org/cargo/reference/workspaces.html
  sunset_condition: "Remove when exported symbols can be moved to concrete owners."

- class_id: feature-explosion
  rule: "Features should stay additive and bounded."
  allowed_exception: "Temporary compatibility shims during ecosystem migration."
  reason_required: "List incompatible combinations, compile guards, and the sunset path."
  fix_tip: "Prefer additive features or split incompatible modes into crates."
  doc_links:
    - https://doc.rust-lang.org/cargo/reference/features.html
  sunset_condition: "Remove when dual-mode compatibility is no longer required."

- class_id: deep-trait-generic-maze
  rule: "Routine edits should not require multi-hop trait archaeology."
  allowed_exception: "Zero-cost abstraction boundaries that materially improve stability or performance."
  reason_required: "Document the mental model and why the abstraction is worth the search cost."
  fix_tip: "Add worked examples, compile-fail tests, and local instructions."
  doc_links:
    - https://doc.rust-lang.org/book/ch10-02-traits.html
  sunset_condition: "Revisit when the abstraction stops buying measurable value."

- class_id: macro-opacity
  rule: "Core business logic should not disappear behind macros."
  allowed_exception: "Derive, proc-macro, DSL, or boilerplate elimination with stable diagnostics."
  reason_required: "Explain the expansion intent and why direct Rust would be worse."
  fix_tip: "Back the macro with trybuild tests and expansion docs."
  doc_links:
    - https://docs.rs/trybuild/latest/trybuild/
  sunset_condition: "Revisit when native language features or simpler helpers can replace the macro."

- class_id: hidden-side-effects
  rule: "Pure and core layers must not hide I/O, env reads, global mutation, or network access."
  allowed_exception: "Explicit adapter boundaries with clear owners."
  reason_required: "Name the side effect, the owner, and the validation ring."
  fix_tip: "Move effects outward and inject results into the core layer."
  doc_links:
    - https://doc.rust-lang.org/book/ch13-04-performance.html
  sunset_condition: "Remove when the side effect can be isolated behind an adapter."

- class_id: orphan-cross-crate-invariant
  rule: "No invariant may span crates without one declared owner."
  allowed_exception: "Shared schemas or protocols that truly require distributed enforcement."
  reason_required: "Name the owning ARC, the consumer ARCs, and the proving tests."
  fix_tip: "Create contract tests and publish the owner in metadata."
  doc_links:
    - https://doc.rust-lang.org/cargo/reference/workspaces.html
  sunset_condition: "Revisit when the invariant can be absorbed into one ARC."

- class_id: integration-test-forest
  rule: "Avoid many tiny top-level integration test binaries."
  allowed_exception: "Genuinely isolated external-surface tests."
  reason_required: "Explain why shared harnesses would reduce clarity or isolation."
  fix_tip: "Collapse related tests into fewer harnesses with internal modules."
  doc_links:
    - https://doc.rust-lang.org/cargo/reference/cargo-targets.html
  sunset_condition: "Revisit when the test count or build time grows."

- class_id: generated-code-blind-spot
  rule: "Generated code must never be invisible to review or validation."
  allowed_exception: "Vendored code outside the normal edit path."
  reason_required: "Record the generator, regeneration command, and proof steps."
  fix_tip: "Add regeneration commands and tests to the repo control plane."
  doc_links:
    - https://doc.rust-lang.org/cargo/reference/manifest.html
  sunset_condition: "Revisit when the generator or vendor boundary changes."

- class_id: mega-file
  rule: "Files should stay under the house budget unless locality clearly wins."
  allowed_exception: "Generated tables, parsers, protocol specs, or benchmark harnesses with strong locality."
  reason_required: "Explain why splitting would make reasoning or validation worse."
  fix_tip: "Extract helpers first; if locality still wins, document the exception and its owner."
  doc_links:
    - https://doc.rust-lang.org/clippy/lint_configuration.html
  sunset_condition: "Revisit when edits repeatedly touch disjoint regions."

- class_id: mega-function
  rule: "Functions should fit inside the local reasoning budget."
  allowed_exception: "Tight benchmark loops, parser state transitions, or carefully linear control logic."
  reason_required: "Explain why extraction would hide invariants or hurt measurement fidelity."
  fix_tip: "Extract helpers, flatten control flow, or record the exception in an AER."
  doc_links:
    - https://doc.rust-lang.org/clippy/lint_configuration.html
  sunset_condition: "Revisit when the function changes more than its exception rationale."

- class_id: undocumented-unsafe
  rule: "Every unsafe site needs a nearby SAFETY comment."
  allowed_exception: "None for undocumented unsafe; the exception is to keep the unsafe site but still document it."
  reason_required: "Explain the exact preconditions that make the site safe."
  fix_tip: "Add a SAFETY comment directly above the unsafe function or block."
  doc_links:
    - https://doc.rust-lang.org/book/ch20-01-unsafe-rust.html
  sunset_condition: "Revisit immediately when the unsafe preconditions change."
