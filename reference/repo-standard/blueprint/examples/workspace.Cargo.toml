[workspace]
members = [
  "crates/domain-core",
  "crates/storage-postgres",
  "crates/http-api",
  "crates/cli",
  "contract-tests",
  "e2e-smoke",
]
default-members = [
  "crates/domain-core",
  "crates/storage-postgres",
  "crates/http-api",
  "crates/cli",
]
resolver = "3"

[workspace.metadata.agent]
validation_order = [
  "cargo check -p <arc>",
  "cargo nextest run -E 'package(<arc>)'",
  "cargo test -p <arc> --doc",
  "cargo nextest run -E 'rdeps(<arc>)' --ignore-default-filter",
  "cargo test -p contract-tests",
  "cargo test -p e2e-smoke",
]
slow_members = ["contract-tests", "e2e-smoke"]
shared_contracts = ["http-api<->domain-core", "storage-postgres<->domain-core"]
ci_profiles = [
  { name = "inner-loop", commands = ["cargo check --workspace", "cargo nextest run -E 'default()'", "cargo test --workspace --doc"] },
  { name = "pull-request", commands = ["cargo vrc plan crates/domain-core/src/lib.rs", "cargo aer scan"] },
  { name = "scheduled-hardening", commands = ["cargo mutants -p domain-core", "cargo hack check --workspace --feature-powerset", "cargo semver-checks check-release"] },
]
instruction_roots = ["AGENTS.md", "CLAUDE.md", ".github/copilot-instructions.md"]
