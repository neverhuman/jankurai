[package]
name = "domain-core"
version = "0.1.0"
edition = "2024"

[package.metadata.agent]
purpose = "Pure business rules and validation"
owned_paths = ["src/**", "challenges/**", "examples/**"]
entrypoints = ["validate_order", "quote_order"]
invariants = [
  "totals are non-negative",
  "currencies must match",
]
local_validate = [
  "cargo check -p domain-core",
  "cargo nextest run -E 'package(domain-core)'",
  "cargo test -p domain-core --doc",
]
boundary_validate = [
  "cargo nextest run -E 'rdeps(domain-core)' --ignore-default-filter",
]
public_api = true
risk = "medium"
consumers = ["http-api", "cli", "storage-postgres"]
exceptions = ["feature_explosion.currency_backcompat"]
