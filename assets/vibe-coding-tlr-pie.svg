<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
  <title id="title">Vibe-coding Top-Level Risk shares</title>
  <desc id="desc">Policy-weighted RPN share by Top-Level Risk bucket for jankurai 0.3.0.</desc>
  <rect width="920" height="420" fill="#ffffff"/>
  <g transform="translate(210 210) rotate(-90)">
    <circle r="118" cx="0" cy="0" fill="none" stroke="#dc2626" stroke-width="64" pathLength="100" stroke-dasharray="32 68" stroke-dashoffset="0"/>
    <circle r="118" cx="0" cy="0" fill="none" stroke="#f97316" stroke-width="64" pathLength="100" stroke-dasharray="20 80" stroke-dashoffset="-32"/>
    <circle r="118" cx="0" cy="0" fill="none" stroke="#0f766e" stroke-width="64" pathLength="100" stroke-dasharray="13 87" stroke-dashoffset="-52"/>
    <circle r="118" cx="0" cy="0" fill="none" stroke="#2563eb" stroke-width="64" pathLength="100" stroke-dasharray="13 87" stroke-dashoffset="-65"/>
    <circle r="118" cx="0" cy="0" fill="none" stroke="#ca8a04" stroke-width="64" pathLength="100" stroke-dasharray="10 90" stroke-dashoffset="-78"/>
    <circle r="118" cx="0" cy="0" fill="none" stroke="#6b7280" stroke-width="64" pathLength="100" stroke-dasharray="9 91" stroke-dashoffset="-88"/>
    <circle r="118" cx="0" cy="0" fill="none" stroke="#9333ea" stroke-width="64" pathLength="100" stroke-dasharray="3 97" stroke-dashoffset="-97"/>
  </g>
  <circle cx="210" cy="210" r="76" fill="#ffffff"/>
  <text x="210" y="198" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Policy</text>
  <text x="210" y="222" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">RPN share</text>
  <text x="210" y="248" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#4b5563">jankurai 0.3.0</text>
  <g font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#111827">
    <text x="420" y="82" font-size="24" font-weight="700">Vibe-Coding Top-Level Risks</text>
    <text x="420" y="112" font-size="13" fill="#4b5563">Shares are computed from the visible taxonomy RPN rows, not incident frequency.</text>
    <rect x="420" y="145" width="18" height="18" fill="#dc2626"/><text x="452" y="160"><tspan font-weight="700">32%</tspan> Security: generated-code flaws, secrets, PII, prompt injection, agency</text>
    <rect x="420" y="181" width="18" height="18" fill="#f97316"/><text x="452" y="196"><tspan font-weight="700">20%</tspan> Business truth: false-green rules, authz/data isolation, idempotency</text>
    <rect x="420" y="217" width="18" height="18" fill="#0f766e"/><text x="452" y="232"><tspan font-weight="700">13%</tspan> Contracts/data: drift, wrong-layer persistence, destructive migrations</text>
    <rect x="420" y="253" width="18" height="18" fill="#2563eb"/><text x="452" y="268"><tspan font-weight="700">13%</tspan> Verification: weak tests, rendered UX, accessibility, eval drift</text>
    <rect x="420" y="289" width="18" height="18" fill="#ca8a04"/><text x="452" y="304"><tspan font-weight="700">10%</tspan> Entropy: dead language, orphan code, mega files, performance drift</text>
    <rect x="420" y="325" width="18" height="18" fill="#6b7280"/><text x="452" y="340"><tspan font-weight="700">9%</tspan> Context/setup: retrieval, setup hallucination, instruction drift</text>
    <rect x="420" y="361" width="18" height="18" fill="#9333ea"/><text x="452" y="376"><tspan font-weight="700">3%</tspan> Repair: observability and repair opacity</text>
  </g>
</svg>
